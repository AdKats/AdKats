name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Package source files
        working-directory: src
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: find . -name '*.cs' -print0 | xargs -0 zip -r "../AdKats-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          name: "AdKats ${{ steps.version.outputs.VERSION }}"
          files: "AdKats-${{ steps.version.outputs.VERSION }}.zip"
          generate_release_notes: true
